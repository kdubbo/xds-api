syntax = "proto3";

package cluster.v1;

import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/wrappers.proto";
import "core/v1/health_check.proto";
import "core/v1/base.proto";
import "core/v1/config_source.proto";
import "endpoint/v1/endpoint.proto";

option go_package = "github.com/kdubbo/xds-api/cluster/v1;clusterv1";

message Cluster {

  message EdsClusterConfig {
    core.v1.ConfigSource eds_config = 1;
    string service_name = 2;
  }

  message CommonLbConfig {
    core.v1.HealthStatusSet override_host_status = 8;
  }

  message CustomClusterType {
    string name = 1;
    google.protobuf.Any typed_config = 2;
  }

  message CircuitBreakers {
    message Thresholds {
      google.protobuf.UInt32Value max_connections = 1;
      google.protobuf.UInt32Value max_pending_requests = 2;
      google.protobuf.UInt32Value max_requests = 3;
      google.protobuf.UInt32Value max_retries = 4;
      bool track_remaining = 5;
    }

    repeated Thresholds thresholds = 1;
  }

  message OutlierDetection {
    google.protobuf.UInt32Value consecutive_5xx = 1;
    google.protobuf.UInt32Value enforcing_consecutive_5xx = 2;
    google.protobuf.UInt32Value consecutive_gateway_failure = 3;
    google.protobuf.UInt32Value enforcing_consecutive_gateway_failure = 4;
    google.protobuf.Duration interval = 5;
    google.protobuf.Duration base_ejection_time = 6;
    google.protobuf.UInt32Value max_ejection_percent = 7;
    bool split_external_local_origin_errors = 8;
    google.protobuf.UInt32Value consecutive_local_origin_failure = 9;
    google.protobuf.UInt32Value enforcing_consecutive_local_origin_failure = 10;
    google.protobuf.UInt32Value enforcing_success_rate = 11;
    google.protobuf.UInt32Value enforcing_local_origin_success_rate = 12;
    google.protobuf.UInt32Value min_health_percent = 13;
  }

  enum DiscoveryType {
    STATIC = 0;
    STRICT_DNS = 1;
    LOGICAL_DNS = 2;
    EDS = 3;
  }
  enum LbPolicy {
    ROUND_ROBIN = 0;
    LEAST_REQUEST = 1;
    RING_HASH = 2;
    RANDOM = 3;
  }

  string name = 1;
  string alt_stat_name = 28;
  oneof cluster_discovery_type {
    DiscoveryType type = 2;
    CustomClusterType cluster_type = 38;
  }

  EdsClusterConfig eds_cluster_config = 3;
  google.protobuf.Duration connect_timeout = 4;
  google.protobuf.UInt32Value per_connection_buffer_limit_bytes = 5;
  LbPolicy lb_policy = 6;
  repeated core.v1.HealthCheck health_checks = 7;
  endpoint.v1.ClusterLoadAssignment load_assignment = 33;
  CommonLbConfig common_lb_config = 27;
  core.v1.TransportSocket transport_socket = 24;
  CircuitBreakers circuit_breakers = 10;
  OutlierDetection outlier_detection = 19;
  google.protobuf.UInt32Value max_requests_per_connection = 29;
}
