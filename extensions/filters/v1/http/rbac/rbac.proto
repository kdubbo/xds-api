syntax = "proto3";

package extensions.filters.http.rbac.v1;

option go_package = "github.com/kdubbo/xds-api/extensions/filters/v1/http/rbac;rbacv1";

message RBAC {
  enum Action {
    ALLOW = 0;
    DENY = 1;
  }

  Action action = 1;
  repeated Rule rules = 2;
}

message Rule {
  repeated Source sources = 1;
  repeated Condition when = 2;
}

message Source {
  repeated string request_principals = 1;
}

message Condition {
  string key = 1;
  repeated string values = 2;
  repeated string not_values = 3;
}
